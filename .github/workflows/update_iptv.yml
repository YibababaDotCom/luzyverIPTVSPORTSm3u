name: Update IPTV Links

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run processing script
        run: |
          cat << 'EOF' > process.py
          import requests
          import re

          source_url = "https://raw.githubusercontent.com/luzyver/IPTV/refs/heads/main/SPORTS.m3u"
          output_file = "iptv_links.txt"
          player_prefix = "https://yibababa.com/player/tcplayer/?url="

          def check_link(url):
              try:
                  # 添加 headers 伪装成浏览器，避免被部分服务器拦截
                  headers = {'User-Agent': 'Mozilla/5.0'}
                  response = requests.head(url, timeout=10, allow_redirects=True, headers=headers)
                  return response.status_code == 200
              except Exception as e:
                  return False

          try:
              response = requests.get(source_url, timeout=15)
              content = response.text
              print(f"成功获取内容，前200个字符: {content[:200]}")
              
              # 优化后的正则：兼容不同的换行符和潜在空格
              # 匹配格式: #EXTINF:...,名称 \n URL
              items = re.findall(r'#EXTINF:.*?,(.*?)\r?\n(https?://\S+)', content)
              print(f"共匹配到 {len(items)} 个频道")
              
              valid_count = 0
              with open(output_file, 'w', encoding='utf-8') as f:
                  for name, link in items:
                      if check_link(link.strip()):
                          f.write(f"{name.strip()},{player_prefix}{link.strip()}\n")
                          valid_count += 1
              print(f"成功写入 {valid_count} 个有效链接到 {output_file}")
          except Exception as e:
              print(f"发生错误: {e}")
          EOF
          python process.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add iptv_links.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update IPTV links" && git push)
