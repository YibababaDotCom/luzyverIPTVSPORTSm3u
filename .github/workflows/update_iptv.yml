name: Update IPTV Links

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早上8点运行（UTC时间0点）
  workflow_dispatch:    # 支持手动触发

jobs:
  update-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run processing script
        run: |
          cat << 'EOF' > process.py
          import requests
          import re

          source_url = "https://raw.githubusercontent.com/luzyver/IPTV/refs/heads/main/SPORTS.m3u"
          output_file = "iptv_links.txt"
          player_prefix = "https://yibababa.com/player/tcplayer/?url="

          def check_link(url):
              try:
                  # 只检查 HEAD，快速判断链接是否响应
                  response = requests.head(url, timeout=5, allow_redirects=True)
                  return response.status_code == 200
              except:
                  return False

          try:
              response = requests.get(source_url, timeout=15)
              content = response.text
              
              # 正则提取名称和URL
              items = re.findall(r'#EXTINF:-1,(.*?)\n(http[s]?://\S+)', content)
              
              with open(output_file, 'w', encoding='utf-8') as f:
                  for name, link in items:
                      if check_link(link):
                          f.write(f"{name.strip()},{player_prefix}{link}\n")
              print(f"Successfully generated {output_file}")
          except Exception as e:
              print(f"Error: {e}")
          EOF
          python process.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add iptv_links.txt
          # 如果文件有变化才提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update IPTV links" && git push)
